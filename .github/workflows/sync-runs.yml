name: Sync Activity History

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Days of Strava history to inspect"
        required: false
        default: "14"
      max_pages:
        description: "Max Strava pages to fetch, 200 activities each"
        required: false
        default: "5"
      force_upload:
        description: "Rewrite visible Drive files even if history is unchanged"
        required: false
        default: "false"
      request_budget:
        description: "Max Strava API requests to spend"
        required: false
        default: "900"

concurrency:
  group: run-history-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      STRAVA_SCOPE: activity:read_all
      STRAVA_ACTIVITY_SPORT_TYPES: Run,TrailRun,VirtualRun,Treadmill,TrackRun,Ride,VirtualRide,MountainBikeRide,GravelRide,EBikeRide,EMountainBikeRide
      STRAVA_TOKEN_JSON_BOOTSTRAP: ${{ secrets.STRAVA_TOKEN_JSON_BOOTSTRAP }}
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      GOOGLE_DRIVE_FOLDER_NAME: Run History for ChatGPT
      GOOGLE_UPLOAD_AS_GOOGLE_DOCS: "true"
      GARMIN_DRIVE_STATE_BACKEND: drive
      GARMIN_DRIVE_OUTPUT_DIR: run_summaries

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Strava activities to Google Drive
        shell: bash
        run: |
          days="${{ github.event.inputs.days }}"
          max_pages="${{ github.event.inputs.max_pages }}"
          force_upload="${{ github.event.inputs.force_upload }}"
          request_budget="${{ github.event.inputs.request_budget }}"
          if [ -z "$days" ]; then days="14"; fi
          if [ -z "$max_pages" ]; then max_pages="5"; fi
          if [ -z "$request_budget" ]; then request_budget="900"; fi
          args=(sync-strava --days "$days" --max-pages "$max_pages" --enrich missing --publish-raw --recent-mile-days 14 --request-budget "$request_budget")
          if [ "$force_upload" = "true" ]; then args+=(--force-upload); fi
          python -m garmin_drive "${args[@]}"
