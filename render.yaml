# Render Blueprint: reliable scheduled Strava + Garmin -> Google Drive sync.
# Connect this repo as a Blueprint in the Render dashboard (New > Blueprint).
# Non-secret config is inline; secrets are marked `sync: false` so Render prompts
# you to enter them in the dashboard and they never live in this (public) repo.
services:
  - type: cron
    name: garmin-drive-sync
    runtime: python
    region: ohio
    plan: starter
    schedule: "3,13,23,33,43,53 * * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m garmin_drive sync-strava --days 14 --max-pages 5 --enrich missing --publish-raw --skip-maps --recent-mile-days 14 --request-budget 900"
    envVars:
      # Must be "drive" on Render; otherwise the job would read an empty
      # ephemeral local disk and miss the durable appData state.
      - key: GARMIN_DRIVE_STATE_BACKEND
        value: drive
      - key: STRAVA_SCOPE
        value: activity:read_all
      - key: STRAVA_ACTIVITY_SPORT_TYPES
        value: Run,TrailRun,VirtualRun,Treadmill,TrackRun,Ride,VirtualRide,MountainBikeRide,GravelRide,EBikeRide,EMountainBikeRide
      - key: GOOGLE_DRIVE_PROJECTS_FOLDER_NAME
        value: Projects
      - key: GOOGLE_DRIVE_RUN_FOLDER_NAME
        value: Run History
      - key: GOOGLE_DRIVE_HEALTH_FOLDER_NAME
        value: Health Data
      - key: GOOGLE_UPLOAD_AS_GOOGLE_DOCS
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.9"
      # Secrets: enter these in the Render dashboard, never commit them.
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      # Body Compass Supabase sink. Use the Supabase SESSION POOLER URI (Render is IPv4-only; the
      # direct db.<ref> host is IPv6-only). Leave unset to disable the sink (Drive output unaffected).
      - key: DATABASE_URL
        sync: false
      - key: BODYCOMPASS_USER_ID
        value: default

  - type: cron
    name: garmin-health-sync
    runtime: python
    region: ohio
    plan: starter
    schedule: "17 */2 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m garmin_drive sync-garmin-health --days 14 --state-backend drive"
    envVars:
      - key: GARMIN_DRIVE_STATE_BACKEND
        value: drive
      - key: GARMIN_HEALTH_TIMEZONE
        value: America/New_York
      - key: GOOGLE_DRIVE_PROJECTS_FOLDER_NAME
        value: Projects
      - key: GOOGLE_DRIVE_RUN_FOLDER_NAME
        value: Run History
      - key: GOOGLE_DRIVE_HEALTH_FOLDER_NAME
        value: Health Data
      - key: GOOGLE_UPLOAD_AS_GOOGLE_DOCS
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.9"
      # Secrets: enter these in the Render dashboard, never commit them.
      - key: GOOGLE_TOKEN_JSON
        sync: false
      # Body Compass Supabase sink (session pooler URI; see the Strava cron note above).
      - key: DATABASE_URL
        sync: false
      - key: BODYCOMPASS_USER_ID
        value: default
